# Level 1 teleoperation configuration seed.
#
# Level 1.9 will add the actual curl retargeter. This file exists now so future
# retargeting work points at the selected final hand, not the debug hand.

model_path: assets/mujoco/hand_scene.xml
gesture_config_path: configs/hand_gestures.yaml

final_hand:
  model: Shadow Hand E3M5 right hand
  source: https://github.com/google-deepmind/mujoco_menagerie/tree/main/shadow_hand
  license: Apache-2.0
  palm_body: rh_palm
  fingertip_bodies:
    thumb: rh_thdistal
    index: rh_ffdistal
    middle: rh_mfdistal
    ring: rh_rfdistal
    pinky: rh_lfdistal
  actuator_groups:
    wrist:
      - rh_A_WRJ2
      - rh_A_WRJ1
    thumb:
      - rh_A_THJ5
      - rh_A_THJ4
      - rh_A_THJ3
      - rh_A_THJ2
      - rh_A_THJ1
    index:
      - rh_A_FFJ4
      - rh_A_FFJ3
      - rh_A_FFJ0
    middle:
      - rh_A_MFJ4
      - rh_A_MFJ3
      - rh_A_MFJ0
    ring:
      - rh_A_RFJ4
      - rh_A_RFJ3
      - rh_A_RFJ0
    pinky:
      - rh_A_LFJ5
      - rh_A_LFJ4
      - rh_A_LFJ3
      - rh_A_LFJ0

notes:
  - This is not a retargeter implementation.
  - Finger distal and middle joints are coupled through tendon actuators ending in J0.
  - Pinch and peace gestures in configs/hand_gestures.yaml are approximate until visual tuning.
